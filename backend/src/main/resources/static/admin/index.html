<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LanMouse 管理后台</title>
<style>
:root{--bg:#1a1a2e;--bg2:#16213e;--bg3:#0f3460;--primary:#4CAF50;--primary2:#45a049;--danger:#f44336;--warn:#ff9800;--info:#2196F3;--text:#e0e0e0;--text2:#aaa;--border:#333;--radius:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:var(--bg2);padding:40px;border-radius:var(--radius);width:360px;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.login-box h1{text-align:center;margin-bottom:30px;font-size:22px;color:var(--primary)}
.form-group{margin-bottom:16px}
.form-group label{display:block;margin-bottom:6px;font-size:13px;color:var(--text2)}
.form-group input{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:14px}
.form-group input:focus{outline:none;border-color:var(--primary)}
.btn{padding:10px 20px;border:none;border-radius:4px;cursor:pointer;font-size:14px;transition:opacity .2s}
.btn:hover{opacity:.85}
.btn-primary{background:var(--primary);color:#fff;width:100%}
.btn-danger{background:var(--danger);color:#fff}
.btn-warn{background:var(--warn);color:#fff}
.btn-sm{padding:5px 12px;font-size:12px}
.app{display:none}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:200px;background:var(--bg2);padding:20px 0}
.sidebar h2{padding:0 20px 20px;font-size:18px;color:var(--primary);border-bottom:1px solid var(--border);margin-bottom:10px}
.nav-item{display:block;padding:12px 20px;color:var(--text2);text-decoration:none;cursor:pointer;transition:all .2s;font-size:14px}
.nav-item:hover,.nav-item.active{color:var(--primary);background:rgba(76,175,80,.1)}
.main{margin-left:200px;padding:24px}
.main h2{margin-bottom:20px;font-size:20px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--bg2);padding:20px;border-radius:var(--radius)}
.stat-card .label{font-size:13px;color:var(--text2);margin-bottom:8px}
.stat-card .value{font-size:28px;font-weight:700;color:var(--primary)}
.stat-card .sub{font-size:12px;color:var(--text2);margin-top:4px}
.card{background:var(--bg2);border-radius:var(--radius);padding:20px;margin-bottom:20px}
.toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.toolbar input,.toolbar select{padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:13px}
.toolbar input{width:160px}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border)}
th{color:var(--text2);font-weight:600;background:rgba(0,0,0,.2)}
tr:hover{background:rgba(76,175,80,.05)}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-green{background:rgba(76,175,80,.2);color:#4CAF50}
.badge-red{background:rgba(244,67,54,.2);color:#f44336}
.badge-yellow{background:rgba(255,152,0,.2);color:#ff9800}
.badge-blue{background:rgba(33,150,243,.2);color:#2196F3}
.badge-gray{background:rgba(158,158,158,.2);color:#9e9e9e}
.pagination{display:flex;gap:6px;margin-top:16px;align-items:center;justify-content:center}
.pagination button{padding:6px 12px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);cursor:pointer;font-size:13px}
.pagination button:disabled{opacity:.4;cursor:default}
.pagination button.active{background:var(--primary);border-color:var(--primary)}
.pagination span{font-size:13px;color:var(--text2)}
.chart-wrap{height:200px;position:relative;margin-top:10px}
.chart-wrap canvas{width:100%;height:100%}
.tab-content{display:none}
.tab-content.active{display:block}
.empty{text-align:center;padding:40px;color:var(--text2)}
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:4px;color:#fff;font-size:14px;z-index:999;animation:slideIn .3s}
.toast-success{background:var(--primary)}
.toast-error{background:var(--danger)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
</style>
</head>
<body>

<!-- Login Page -->
<div id="loginPage" class="login-wrap">
<div class="login-box">
<h1>LanMouse 管理后台</h1>
<div class="form-group"><label>用户名</label><input id="loginUser" type="text" placeholder="admin"></div>
<div class="form-group"><label>密码</label><input id="loginPass" type="password" placeholder="••••••"></div>
<button class="btn btn-primary" onclick="doLogin()">登 录</button>
</div>
</div>

<!-- Main App -->
<div id="appPage" class="app">
<nav class="sidebar">
<h2>LanMouse</h2>
<a class="nav-item active" data-tab="dashboard" onclick="switchTab('dashboard')">仪表盘</a>
<a class="nav-item" data-tab="users" onclick="switchTab('users')">用户管理</a>
<a class="nav-item" data-tab="devices" onclick="switchTab('devices')">设备管理</a>
<a class="nav-item" data-tab="orders" onclick="switchTab('orders')">订单管理</a>
<a class="nav-item" style="margin-top:auto;position:absolute;bottom:20px" onclick="doLogout()">退出登录</a>
</nav>
<div class="main">
<!-- Dashboard -->
<div id="tab-dashboard" class="tab-content active">
<h2>数据总览</h2>
<div class="stats-grid" id="statsCards"></div>
<div class="card"><h3 style="margin-bottom:10px">近30天趋势</h3><div class="chart-wrap"><canvas id="trendChart"></canvas></div></div>
</div>

<!-- Users -->
<div id="tab-users" class="tab-content">
<h2>用户管理</h2>
<div class="card">
<div class="toolbar">
<input id="userPhone" placeholder="手机号"><input id="userName" placeholder="姓名">
<select id="userStatus"><option value="">全部状态</option><option value="1">正常</option><option value="0">禁用</option></select>
<button class="btn btn-primary btn-sm" onclick="loadUsers(1)">搜索</button>
</div>
<div id="usersTable"></div>
</div>
</div>

<!-- Devices -->
<div id="tab-devices" class="tab-content">
<h2>设备管理</h2>
<div class="card">
<div class="toolbar">
<input id="devUserId" placeholder="用户ID" type="number">
<select id="devStatus"><option value="">全部状态</option><option value="0">未激活</option><option value="1">正常</option><option value="2">冻结</option></select>
<select id="devOs"><option value="">全部系统</option><option value="android">Android</option><option value="ios">iOS</option><option value="windows">Windows</option></select>
<button class="btn btn-primary btn-sm" onclick="loadDevices(1)">搜索</button>
</div>
<div id="devicesTable"></div>
</div>
</div>

<!-- Orders -->
<div id="tab-orders" class="tab-content">
<h2>订单管理</h2>
<div class="card">
<div class="toolbar">
<input id="orderUserId" placeholder="用户ID" type="number">
<select id="orderStatus"><option value="">全部状态</option><option value="pending">待支付</option><option value="paid">已支付</option><option value="expired">已过期</option></select>
<button class="btn btn-primary btn-sm" onclick="loadOrders(1)">搜索</button>
</div>
<div id="ordersTable"></div>
</div>
<div class="card" style="margin-top:20px">
<h3 style="margin-bottom:10px">订阅记录</h3>
<div class="toolbar">
<input id="subUserId" placeholder="用户ID" type="number">
<select id="subPayStatus"><option value="">全部状态</option><option value="pending">待支付</option><option value="paid">已支付</option><option value="refunded">已退款</option><option value="cancelled">已取消</option></select>
<button class="btn btn-primary btn-sm" onclick="loadSubscriptions(1)">搜索</button>
</div>
<div id="subsTable"></div>
</div>
</div>
</div>
</div>

<script>
const API=window.location.origin+'/api/admin';
let token=localStorage.getItem('admin_token');
let currentTab='dashboard';

// Auth
async function api(path,opts={}){
  const h={'Content-Type':'application/json'};
  if(token)h['Authorization']='Bearer '+token;
  const r=await fetch(API+path,{...opts,headers:h});
  if(r.status===401){doLogout();throw new Error('未授权');}
  const d=await r.json();
  if(d.code!==0)throw new Error(d.msg);
  return d.data;
}

function toast(msg,type='success'){
  const el=document.createElement('div');
  el.className='toast toast-'+type;
  el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),3000);
}

async function doLogin(){
  const username=document.getElementById('loginUser').value;
  const password=document.getElementById('loginPass').value;
  try{
    const d=await api('/login',{method:'POST',body:JSON.stringify({username,password})});
    token=d.token;
    localStorage.setItem('admin_token',token);
    showApp();
    toast('登录成功');
  }catch(e){toast(e.message,'error');}
}

function doLogout(){
  token=null;
  localStorage.removeItem('admin_token');
  document.getElementById('loginPage').style.display='flex';
  document.getElementById('appPage').style.display='none';
}

function showApp(){
  document.getElementById('loginPage').style.display='none';
  document.getElementById('appPage').style.display='block';
  switchTab('dashboard');
}

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.querySelector(`.nav-item[data-tab="${tab}"]`).classList.add('active');
  if(tab==='dashboard')loadDashboard();
  else if(tab==='users')loadUsers(1);
  else if(tab==='devices')loadDevices(1);
  else if(tab==='orders'){loadOrders(1);loadSubscriptions(1);}
}

// Dashboard
async function loadDashboard(){
  try{
    const s=await api('/stats/overview');
    document.getElementById('statsCards').innerHTML=`
      <div class="stat-card"><div class="label">总用户</div><div class="value">${s.totalUsers}</div><div class="sub">今日 +${s.todayNewUsers}</div></div>
      <div class="stat-card"><div class="label">总设备</div><div class="value">${s.totalDevices}</div></div>
      <div class="stat-card"><div class="label">有效订阅</div><div class="value">${s.activeSubscriptions}</div></div>
      <div class="stat-card"><div class="label">总收入</div><div class="value">¥${s.totalRevenue||0}</div></div>
      <div class="stat-card"><div class="label">今日订单</div><div class="value">${s.todayNewOrders}</div></div>`;
    const trend=await api('/stats/trend?days=30');
    drawTrendChart(trend);
  }catch(e){toast(e.message,'error');}
}

function drawTrendChart(data){
  const canvas=document.getElementById('trendChart');
  const ctx=canvas.getContext('2d');
  const rect=canvas.parentElement.getBoundingClientRect();
  canvas.width=rect.width;canvas.height=rect.height;
  const w=canvas.width,h=canvas.height,pad={t:20,r:20,b:30,l:40};
  const cw=w-pad.l-pad.r,ch=h-pad.t-pad.b;
  ctx.clearRect(0,0,w,h);
  if(!data.length)return;
  const maxU=Math.max(...data.map(d=>d.newUsers),1);
  const maxO=Math.max(...data.map(d=>d.newOrders),1);
  const step=cw/(data.length-1||1);
  // Grid
  ctx.strokeStyle='#333';ctx.lineWidth=0.5;
  for(let i=0;i<=4;i++){const y=pad.t+ch*i/4;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(w-pad.r,y);ctx.stroke();}
  // Users line
  ctx.strokeStyle='#4CAF50';ctx.lineWidth=2;ctx.beginPath();
  data.forEach((d,i)=>{const x=pad.l+i*step,y=pad.t+ch-(d.newUsers/maxU)*ch;i?ctx.lineTo(x,y):ctx.moveTo(x,y);});
  ctx.stroke();
  // Orders line
  ctx.strokeStyle='#2196F3';ctx.lineWidth=2;ctx.beginPath();
  data.forEach((d,i)=>{const x=pad.l+i*step,y=pad.t+ch-(d.newOrders/maxO)*ch;i?ctx.lineTo(x,y):ctx.moveTo(x,y);});
  ctx.stroke();
  // X labels
  ctx.fillStyle='#aaa';ctx.font='10px sans-serif';ctx.textAlign='center';
  [0,Math.floor(data.length/2),data.length-1].forEach(i=>{
    if(data[i])ctx.fillText(data[i].date,pad.l+i*step,h-5);
  });
  // Legend
  ctx.fillStyle='#4CAF50';ctx.fillRect(pad.l,5,12,3);ctx.fillStyle='#aaa';ctx.font='11px sans-serif';ctx.fillText('新用户',pad.l+40,10);
  ctx.fillStyle='#2196F3';ctx.fillRect(pad.l+80,5,12,3);ctx.fillText('新订单',pad.l+120,10);
}

// Users
async function loadUsers(page){
  const p=new URLSearchParams({page,size:'20'});
  const phone=document.getElementById('userPhone').value;
  const name=document.getElementById('userName').value;
  const status=document.getElementById('userStatus').value;
  if(phone)p.set('phone',phone);if(name)p.set('name',name);if(status)p.set('status',status);
  try{
    const d=await api('/users?'+p.toString());
    let html='<table><thead><tr><th>ID</th><th>手机号</th><th>姓名</th><th>用户组</th><th>设备</th><th>订阅</th><th>状态</th><th>注册时间</th><th>操作</th></tr></thead><tbody>';
    if(!d.records.length)html+='<tr><td colspan="9" class="empty">暂无数据</td></tr>';
    d.records.forEach(u=>{
      const st=u.status===1?'<span class="badge badge-green">正常</span>':'<span class="badge badge-red">禁用</span>';
      const sub=u.hasActiveSubscription?'<span class="badge badge-green">有效</span>':'<span class="badge badge-gray">无</span>';
      const act=u.status===1?`<button class="btn btn-danger btn-sm" onclick="setUserStatus(${u.id},0)">禁用</button>`:`<button class="btn btn-primary btn-sm" onclick="setUserStatus(${u.id},1)">启用</button>`;
      html+=`<tr><td>${u.id}</td><td>${u.phone}</td><td>${u.name||''}</td><td>${u.userGroupName||'-'}</td><td>${u.deviceCount}</td><td>${sub}</td><td>${st}</td><td>${fmtDate(u.createdAt)}</td><td>${act} <button class="btn btn-warn btn-sm" onclick="changeGroup(${u.id},${u.userGroupId})">改组</button></td></tr>`;
    });
    html+='</tbody></table>';
    html+=paginate(d);
    document.getElementById('usersTable').innerHTML=html;
  }catch(e){toast(e.message,'error');}
}

async function setUserStatus(id,status){
  try{await api('/users/'+id+'/status',{method:'PUT',body:JSON.stringify({status})});toast('操作成功');loadUsers(1);}catch(e){toast(e.message,'error');}
}

async function changeGroup(id,cur){
  const groups=[{id:1,name:'普通'},{id:2,name:'学生'},{id:3,name:'VIP'},{id:4,name:'企业'}];
  const opts=groups.map(g=>`<option value="${g.id}"${g.id===cur?' selected':''}>${g.name}</option>`).join('');
  const html=`<div style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:99" onclick="if(event.target===this)this.remove()">
    <div style="background:var(--bg2);padding:24px;border-radius:8px;min-width:260px"><h3 style="margin-bottom:16px">修改用户组</h3>
    <select id="newGroup" style="width:100%;padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text)">${opts}</select>
    <div style="margin-top:12px;display:flex;gap:8px;justify-content:flex-end"><button class="btn btn-sm" style="background:var(--border);color:var(--text)" onclick="this.closest('div[style]').parentElement.remove()">取消</button>
    <button class="btn btn-primary btn-sm" onclick="doChangeGroup(${id})">确定</button></div></div></div>`;
  document.body.insertAdjacentHTML('beforeend',html);
}

async function doChangeGroup(id){
  const gid=document.getElementById('newGroup').value;
  try{await api('/users/'+id+'/group',{method:'PUT',body:JSON.stringify({userGroupId:parseInt(gid)})});toast('用户组已更新');loadUsers(1);}catch(e){toast(e.message,'error');}
  document.querySelector('div[style*="position:fixed"]')?.remove();
}

// Devices
async function loadDevices(page){
  const p=new URLSearchParams({page,size:'20'});
  const uid=document.getElementById('devUserId').value;
  const st=document.getElementById('devStatus').value;
  const os=document.getElementById('devOs').value;
  if(uid)p.set('userId',uid);if(st)p.set('status',st);if(os)p.set('osType',os);
  try{
    const d=await api('/devices?'+p.toString());
    let html='<table><thead><tr><th>ID</th><th>用户</th><th>设备名</th><th>型号</th><th>系统</th><th>IMEI</th><th>最后IP</th><th>状态</th><th>注册时间</th><th>操作</th></tr></thead><tbody>';
    if(!d.records.length)html+='<tr><td colspan="10" class="empty">暂无数据</td></tr>';
    d.records.forEach(dev=>{
      const stMap={'0':'未激活','1':'正常','2':'冻结'};const stCls={'0':'badge-gray','1':'badge-green','2':'badge-red'};
      const act=dev.status===1?`<button class="btn btn-danger btn-sm" onclick="setDevStatus(${dev.id},2)">冻结</button>`:`<button class="btn btn-primary btn-sm" onclick="setDevStatus(${dev.id},1)">解冻</button>`;
      html+=`<tr><td>${dev.id}</td><td>${dev.userName||'-'}<br><small style="color:var(--text2)">${dev.userPhone||''}</small></td><td>${dev.deviceName}</td><td>${dev.deviceModel||'-'}</td><td>${dev.osType}</td><td>${dev.imei1||dev.iosDeviceId||'-'}</td><td>${dev.lastIp||'-'}</td><td><span class="badge ${stCls[dev.status]}">${stMap[dev.status]}</span></td><td>${fmtDate(dev.createdAt)}</td><td>${act}</td></tr>`;
    });
    html+='</tbody></table>'+paginate(d);
    document.getElementById('devicesTable').innerHTML=html;
  }catch(e){toast(e.message,'error');}
}

async function setDevStatus(id,status){
  try{await api('/devices/'+id+'/status',{method:'PUT',body:JSON.stringify({status})});toast('操作成功');loadDevices(1);}catch(e){toast(e.message,'error');}
}

// Orders
async function loadOrders(page){
  const p=new URLSearchParams({page,size:'20'});
  const uid=document.getElementById('orderUserId').value;
  const st=document.getElementById('orderStatus').value;
  if(uid)p.set('userId',uid);if(st)p.set('status',st);
  try{
    const d=await api('/orders?'+p.toString());
    let html='<table><thead><tr><th>订单号</th><th>用户</th><th>设备</th><th>金额</th><th>状态</th><th>创建时间</th><th>支付时间</th><th>操作</th></tr></thead><tbody>';
    if(!d.records.length)html+='<tr><td colspan="8" class="empty">暂无数据</td></tr>';
    d.records.forEach(o=>{
      const stMap={'pending':'待支付','paid':'已支付','expired':'已过期'};const stCls={'pending':'badge-yellow','paid':'badge-green','expired':'badge-gray'};
      const act=o.status==='paid'?`<button class="btn btn-danger btn-sm" onclick="refundOrder('${o.orderNo}')">退款</button>`:'';
      html+=`<tr><td style="font-size:11px">${o.orderNo}</td><td>${o.userName||'-'}<br><small style="color:var(--text2)">${o.userPhone||''}</small></td><td>${o.deviceName||'-'}</td><td>¥${o.amount}</td><td><span class="badge ${stCls[o.status]||'badge-gray'}">${stMap[o.status]||o.status}</span></td><td>${fmtDate(o.createdAt)}</td><td>${fmtDate(o.paidAt)||'-'}</td><td>${act}</td></tr>`;
    });
    html+='</tbody></table>'+paginate(d,page,'loadOrders');
    document.getElementById('ordersTable').innerHTML=html;
  }catch(e){toast(e.message,'error');}
}

async function refundOrder(orderNo){
  if(!confirm('确认退款？'))return;
  try{await api('/orders/'+orderNo+'/refund',{method:'PUT'});toast('退款成功');loadOrders(1);}catch(e){toast(e.message,'error');}
}

// Subscriptions
async function loadSubscriptions(page){
  const p=new URLSearchParams({page,size:'20'});
  const uid=document.getElementById('subUserId').value;
  const st=document.getElementById('subPayStatus').value;
  if(uid)p.set('userId',uid);if(st)p.set('paymentStatus',st);
  try{
    const d=await api('/subscriptions?'+p.toString());
    let html='<table><thead><tr><th>订单号</th><th>用户</th><th>设备</th><th>有效期</th><th>金额</th><th>支付状态</th><th>剩余</th></tr></thead><tbody>';
    if(!d.records.length)html+='<tr><td colspan="7" class="empty">暂无数据</td></tr>';
    d.records.forEach(s=>{
      const stMap={'pending':'待支付','paid':'已支付','refunded':'已退款','cancelled':'已取消'};const stCls={'pending':'badge-yellow','paid':'badge-green','refunded':'badge-red','cancelled':'badge-gray'};
      const days=s.daysRemaining;const daysHtml=days>0?`<span class="badge badge-green">${days}天</span>`:days===0?'<span class="badge badge-yellow">今天到期</span>':'<span class="badge badge-red">已过期</span>';
      html+=`<tr><td style="font-size:11px">${s.orderNo}</td><td>${s.userName||'-'}<br><small style="color:var(--text2)">${s.userPhone||''}</small></td><td>${s.deviceName||'-'}</td><td>${s.startDate} ~ ${s.endDate}</td><td>¥${s.amount}</td><td><span class="badge ${stCls[s.paymentStatus]||'badge-gray'}">${stMap[s.paymentStatus]||s.paymentStatus}</span></td><td>${s.paymentStatus==='paid'?daysHtml:'-'}</td></tr>`;
    });
    html+='</tbody></table>'+paginate(d,page,'loadSubscriptions');
    document.getElementById('subsTable').innerHTML=html;
  }catch(e){toast(e.message,'error');}
}

// Helpers
function fmtDate(d){if(!d)return'';return d.replace('T',' ').substring(0,16);}

function paginate(d,curPage,fn){
  if(!fn)fn='loadUsers';
  const pages=Math.ceil(d.total/d.size);if(pages<=1)return'';
  let html='<div class="pagination">';
  html+=`<button onclick="${fn}(${curPage-1||1})" ${curPage<=1?'disabled':''}>上一页</button>`;
  const start=Math.max(1,curPage-2),end=Math.min(pages,curPage+2);
  for(let i=start;i<=end;i++)html+=`<button class="${i===curPage?'active':''}" onclick="${fn}(${i})">${i}</button>`;
  html+=`<button onclick="${fn}(${Math.min(curPage+1,pages)})" ${curPage>=pages?'disabled':''}>下一页</button>`;
  html+=`<span>共 ${d.total} 条</span></div>`;
  return html;
}

// Init
if(token){showApp();}else{document.getElementById('loginPage').style.display='flex';}
document.getElementById('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
