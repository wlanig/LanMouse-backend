name: CI/CD

on:
  push:
    branches:
      - master
    tags:
      - 'v*'

jobs:
  # ──────────────────────────────────────────────
  # Backend: Java 17 + Maven
  # ──────────────────────────────────────────────
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Run tests
        run: mvn test

      - name: Upload backend JAR
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/lanmouse-backend-1.0.0.jar
          retention-days: 5

  # ──────────────────────────────────────────────
  # Mobile: Flutter + Android APK (signed)
  # ──────────────────────────────────────────────
  build-mobile:
    name: Build Mobile (Android)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Run Flutter analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Decode Android keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/lanmouse-release.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties << EOF
          ${{ secrets.KEY_PROPERTIES }}
          EOF

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mobile-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 5

  # ──────────────────────────────────────────────
  # PC Server: Electron + NSIS (Windows)
  # ──────────────────────────────────────────────
  build-pc-server:
    name: Build PC Server (Windows)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: pc-server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: pc-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app (NSIS installer)
        run: npm run build -- --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: pc-server-installer
          path: pc-server/dist/LanMouse Server Setup 1.0.0.exe
          retention-days: 5

  # ──────────────────────────────────────────────
  # Release: Create GitHub Release with artifacts
  # ──────────────────────────────────────────────
  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-backend
      - build-mobile
      - build-pc-server
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename artifacts for release
        run: |
          mkdir -p release-assets
          cp artifacts/backend-jar/lanmouse-backend-1.0.0.jar release-assets/
          cp artifacts/mobile-apk/app-release.apk release-assets/LanMouse-${{ github.ref_name }}.apk
          cp "artifacts/pc-server-installer/LanMouse Server Setup 1.0.0.exe" release-assets/LanMouse-Server-Setup-${{ github.ref_name }}.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/lanmouse-backend-1.0.0.jar
            release-assets/LanMouse-${{ github.ref_name }}.apk
            release-assets/LanMouse-Server-Setup-${{ github.ref_name }}.exe
